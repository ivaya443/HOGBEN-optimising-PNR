name: hogben-optimising-pnr
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - pip
  - jupyterlab
  - notebook
  - ipykernel
  - numpy
  - scipy
  - matplotlib
  - h5py
  - tqdm
  - ipywidgets
  - xlrd
  - cython
  - pytest

  # Prebuilt binaries on macOS/Windows/Linux (avoid pip builds)
  - refl1d

  - pip:
      - refnx==0.1.58
      - svgutils
      - cairosvg
      # Install hogben after env creation (see README), or keep here if it works for you
      # but macOS users may hit llvmlite build errors if refl1d is not already installed.